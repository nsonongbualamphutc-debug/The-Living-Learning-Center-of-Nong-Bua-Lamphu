<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดศูนย์เรียนรู้ | จังหวัดหนองบัวลำภู</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&family=Maitree:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --forest-950:#0f2818;--forest-900:#14331f;--forest-800:#1c4a2c;--forest-700:#266038;
  --leaf:#4a8c3f;--leaf-soft:#e8f0df;
  --gold:#c8962b;--gold-bright:#e2a82c;--gold-soft:#f5ebd4;
  --cream:#f6f2e8;--paper:#fffdf7;--ink:#23251c;--muted:#7a7a6a;
  --line:#e6e1d3;--line-soft:#efebdf;--teal:#159486;
  --r:18px;--r-sm:12px;
  --sh-sm:0 1px 2px rgba(20,40,20,.06);--sh:0 4px 18px rgba(20,40,20,.08);--sh-lg:0 16px 44px rgba(20,40,20,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--ink);line-height:1.7}
h1,h2,h3,h4{font-family:'Kanit',sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
::selection{background:var(--gold-soft)}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;animation:rise .65s cubic-bezier(.2,.7,.3,1) forwards}

/* ===== Top nav ===== */
.topnav{position:sticky;top:0;z-index:1000;background:rgba(15,40,24,.96);backdrop-filter:blur(8px);color:#fff}
.topnav .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 22px}
.topnav .back{display:inline-flex;align-items:center;gap:7px;color:#fff;text-decoration:none;font-family:'Kanit';font-size:14.5px;
  font-weight:500;padding:7px 15px;border:1px solid rgba(255,255,255,.25);border-radius:30px;transition:.2s}
.topnav .back:hover{background:rgba(255,255,255,.12)}
.topnav .tn-name{font-family:'Kanit';font-size:14.5px;font-weight:500;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55vw}

/* ===== HERO + gallery ===== */
.hero{position:relative;background:var(--forest-900);color:#fff;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:430px}
.hero-text{padding:46px 0 46px 0;display:flex;flex-direction:column;justify-content:center}
.hero-text .wrapn{padding-right:36px}
.crumb{font-family:'Kanit';font-size:13px;color:var(--gold-bright);letter-spacing:.5px;margin-bottom:14px}
.hero-badge{display:inline-flex;align-items:center;gap:7px;color:#fff;font-family:'Kanit';font-size:13px;font-weight:500;
  padding:5px 14px;border-radius:18px;margin-bottom:16px}
.hero h1{font-size:clamp(26px,4vw,40px);font-weight:700;line-height:1.15;letter-spacing:-.5px}
.hero-loc{font-size:15px;color:#cdddc6;margin-top:12px;display:flex;align-items:center;gap:7px}
.hero-mini{display:flex;gap:22px;margin-top:24px;flex-wrap:wrap}
.hero-mini .hm .v{font-family:'Kanit';font-size:24px;font-weight:600;color:var(--gold-bright);line-height:1}
.hero-mini .hm .l{font-size:12.5px;color:#bcccb4;margin-top:3px}

/* gallery */
.gallery{padding:24px 22px 24px 0;display:flex;flex-direction:column;gap:10px}
.g-main{flex:1;min-height:300px;border-radius:var(--r);overflow:hidden;position:relative;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14)}
.g-main img{width:100%;height:100%;object-fit:cover;display:block}
.g-thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  cursor:pointer;position:relative;transition:.2s}
.g-thumb:hover{border-color:var(--gold-bright)}
.g-thumb.active{border:2px solid var(--gold-bright)}
.g-thumb img{width:100%;height:100%;object-fit:cover}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  color:rgba(255,255,255,.5);text-align:center;padding:8px;
  background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.02) 0 10px,transparent 10px 20px)}
.ph .ph-ico{font-size:30px;opacity:.7}
.ph .ph-tx{font-family:'Kanit';font-size:13px;font-weight:400}
.g-thumb .ph .ph-ico{font-size:18px}.g-thumb .ph .ph-tx{font-size:10.5px;display:none}
.ph-note{font-size:11px;color:rgba(255,255,255,.4);text-align:center;font-family:'Sarabun'}

/* ===== Section base ===== */
section{padding:50px 0}
.sec-label{font-family:'Kanit';font-size:13px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;margin-bottom:8px}
.sec-title{font-size:clamp(22px,3vw,30px);font-weight:600;line-height:1.2;margin-bottom:22px}

/* Block 1: STORY (editorial, serif, calm) */
.s-story{background:var(--paper)}
.s-story .sec-label{color:var(--gold)}
.s-story .sec-title{color:var(--forest-900)}
.story-body{font-family:'Maitree',serif;font-size:17px;line-height:1.95;color:#3c3f30;max-width:760px;
  border-left:4px solid var(--gold);padding-left:24px}
.story-body p{margin-bottom:16px}

/* Block 2: QUICK FACTS (dark band, gold numbers, punchy) */
.s-facts{background:var(--forest-900);color:#fff}
.s-facts .sec-label{color:var(--gold-bright)}
.s-facts .sec-title{color:#fff}
.facts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.fact{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);padding:22px;position:relative;overflow:hidden}
.fact::after{content:"";position:absolute;right:-16px;top:-16px;width:60px;height:60px;border-radius:50%;background:rgba(226,168,44,.1)}
.fact .f-ico{font-size:22px;width:44px;height:44px;border-radius:12px;background:rgba(226,168,44,.16);display:flex;
  align-items:center;justify-content:center;border:1px solid rgba(226,168,44,.25);margin-bottom:13px}
.fact .f-v{font-family:'Kanit';font-size:25px;font-weight:700;color:var(--gold-bright);line-height:1.1;position:relative;z-index:1}
.fact .f-l{font-size:13px;color:#bcccb4;margin-top:5px}

/* Block 3: BASES (exploratory tiles) */
.s-bases{background:var(--cream)}
.s-bases .sec-label{color:var(--leaf)}
.s-bases .sec-title{color:var(--forest-900)}
.bases{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.base{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:20px;transition:.2s;position:relative;overflow:hidden}
.base:hover{transform:translateY(-4px);box-shadow:var(--sh-lg)}
.base .b-num{position:absolute;right:16px;top:14px;font-family:'Kanit';font-size:34px;font-weight:700;color:var(--leaf-soft);line-height:1}
.base .b-ico{font-size:28px;margin-bottom:12px}
.base h4{font-size:16.5px;font-weight:600;color:var(--forest-900);margin-bottom:6px;position:relative;z-index:1}
.base p{font-size:13.5px;color:var(--muted);line-height:1.6}

/* Block 4: PRODUCTS (showcase chips on tinted bg) */
.s-products{background:var(--leaf-soft)}
.s-products .sec-label{color:var(--forest-700)}
.s-products .sec-title{color:var(--forest-900)}
.chips{display:flex;flex-wrap:wrap;gap:11px;max-width:840px}
.chip{background:var(--paper);border:1px solid var(--line);border-radius:30px;padding:10px 20px;font-size:15px;
  font-family:'Kanit';font-weight:400;color:var(--forest-800);display:inline-flex;align-items:center;gap:8px;transition:.2s}
.chip:hover{border-color:var(--leaf);transform:translateY(-2px)}
.chip .c-dot{width:8px;height:8px;border-radius:50%;background:var(--leaf)}

/* Block 5: UPCOMING (timeline feel) */
.s-upcoming{background:var(--paper)}
.s-upcoming .sec-label{color:var(--teal)}
.s-upcoming .sec-title{color:var(--forest-900)}
.timeline{max-width:760px}
.tl-item{display:flex;gap:18px;padding-bottom:22px;position:relative}
.tl-item:not(:last-child)::before{content:"";position:absolute;left:13px;top:30px;bottom:0;width:2px;background:var(--line)}
.tl-dot{width:28px;height:28px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;z-index:1}
.tl-body .tl-when{font-family:'Kanit';font-size:13px;font-weight:600;color:var(--teal)}
.tl-body .tl-what{font-size:15px;color:var(--ink);margin-top:2px}

/* Block 6: VISIT INFO (practical, map + amenities) */
.s-visit{background:var(--cream)}
.s-visit .sec-label{color:var(--gold)}
.s-visit .sec-title{color:var(--forest-900)}
.visit-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.amen-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.amen-item{display:flex;align-items:center;gap:11px;background:var(--paper);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:13px 15px;font-size:14.5px}
.amen-item .a-ico{font-size:20px}
.amen-item.off{opacity:.4}
.amen-item .a-x{margin-left:auto;font-size:13px}
.contact-card{background:var(--forest-900);color:#fff;border-radius:var(--r);padding:20px 22px;margin-bottom:14px}
.contact-card h4{font-size:15px;margin-bottom:12px;color:var(--gold-bright)}
.contact-card .cc-row{display:flex;align-items:center;gap:10px;font-size:14.5px;margin-bottom:9px}
.contact-card .cc-row a{color:#fff}
#dmap{height:340px;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--line);z-index:1}
.go-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--forest-800);color:#fff;
  font-family:'Kanit';font-size:15px;font-weight:500;padding:14px;border-radius:var(--r-sm);text-decoration:none;margin-top:12px;transition:.2s}
.go-btn:hover{background:var(--forest-900)}

/* footer */
footer.site{background:var(--teal);color:#fff}
.foot-bar{padding:16px 24px;font-size:12.5px;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:6px 26px;text-align:center}
.foot-bar .links a{color:#fff;opacity:.92;text-decoration:none;margin:0 9px}
.disclaimer{text-align:center;color:var(--muted);font-size:12px;padding:16px 22px 22px}
/* Block: VIDEO */
.s-video{background:var(--forest-950);color:#fff}
.s-video .sec-label{color:var(--gold-bright)}
.s-video .sec-title{color:#fff}
.video-box{position:relative;width:100%;max-width:880px;aspect-ratio:16/9;border-radius:var(--r);overflow:hidden;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14)}
.video-box iframe{width:100%;height:100%;border:0;display:block}
.video-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  color:rgba(255,255,255,.55);background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.02) 0 12px,transparent 12px 24px)}
.video-ph .vp-play{width:64px;height:64px;border-radius:50%;background:rgba(226,168,44,.18);border:1px solid rgba(226,168,44,.35);
  display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--gold-bright)}
.video-ph .vp-tx{font-family:'Kanit';font-size:15px}
.video-ph .vp-note{font-size:12px;color:rgba(255,255,255,.4)}

/* Block: SHARE + QR */
.s-share{background:var(--cream)}
.share-grid{display:grid;grid-template-columns:1.4fr auto;gap:24px;align-items:center;background:var(--paper);
  border:1px solid var(--line);border-radius:var(--r);padding:26px 28px;box-shadow:var(--sh-sm)}
.share-card h3{font-size:20px;font-weight:600;color:var(--forest-900);margin-bottom:6px}
.share-card p{font-size:14px;color:var(--muted);margin-bottom:16px}
.share-btns{display:flex;gap:11px;flex-wrap:wrap}
.share-btn{font-family:'Kanit';font-size:14.5px;font-weight:500;padding:11px 20px;border-radius:11px;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;transition:.18s}
.share-btn.primary{background:var(--forest-800);color:#fff}.share-btn.primary:hover{background:var(--forest-900)}
.share-btn.ghost{background:#fff;color:var(--forest-700);border:1.5px solid var(--leaf)}.share-btn.ghost:hover{background:var(--leaf-soft)}
.qr-card{text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
.qr-card #qrbox{padding:10px;background:#fff;border:1px solid var(--line);border-radius:14px;line-height:0}
.qr-card #qrbox img,.qr-card #qrbox canvas{border-radius:6px}
.qr-card span{font-size:12.5px;color:var(--muted)}
.copied{font-size:12.5px;color:var(--leaf);font-weight:600;opacity:0;transition:.3s}
.copied.show{opacity:1}

/* Block: PREV / NEXT */
.prevnext{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:28px 0 8px}
.pn{display:flex;flex-direction:column;gap:4px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 20px;text-decoration:none;transition:.2s}
.pn:hover{border-color:var(--leaf);transform:translateY(-3px);box-shadow:var(--sh)}
.pn .pn-dir{font-family:'Kanit';font-size:12.5px;color:var(--muted);font-weight:500}
.pn .pn-name{font-family:'Kanit';font-size:15.5px;font-weight:600;color:var(--forest-900)}
.pn.next{text-align:right}

@media(max-width:560px){
  .share-grid{grid-template-columns:1fr;text-align:center}
  .share-btns{justify-content:center}
  .prevnext{grid-template-columns:1fr}
  .pn.next{text-align:left}
}

@media(max-width:820px){
  .hero-grid{grid-template-columns:1fr}
  .hero-text{padding:38px 0 10px}
  .hero-text .wrapn{padding-right:0}
  .gallery{padding:8px 0 28px}
  .visit-grid{grid-template-columns:1fr}
}
@media(max-width:560px){
  .wrap{padding:0 16px}
  section{padding:38px 0}
  .story-body{font-size:16px;padding-left:18px}
  .topnav .tn-name{display:none}
  .amen-list{grid-template-columns:1fr}
}
</style>
</head>

  products:["ข้าว","พืช 5 ระดับ","ไก่กุดดู่หางขาว","ปลา","ป่า 3 อย่าง"],
  upcoming:[{w:"7 พ.ค. 2569",t:"จัดทำแผนพัฒนาคุณภาพชีวิตกลุ่มเปราะบาง"},
    {w:"10–14 พ.ค. 2569",t:"อบรมการเล่าเรื่อง (Storytelling) สื่อออนไลน์"},
    {w:"มิ.ย. 2569",t:"พัฒนาเรือนเพาะชำ ซุ้มอาหาร และพื้นที่คัดไก่พันธุ์ดี"}],

const AMEN={parking:["🅿️","ที่จอดรถ"],toilet:["🚻","ห้องน้ำ"],food:["🍽️","อาหาร/ร้านอาหาร"],stay:["🛏️","ที่พัก/โฮมสเตย์"],meeting:["🏛️","ห้องประชุม/ศาลา"]};

/* ===== Gallery (placeholders when no image) ===== */
function gallery(imgs){
  const phMain=`<div class="ph"><span class="ph-ico">🖼️</span><span class="ph-tx">โปรดนำภาพเข้า</span></div>`;
  const phThumb=`<div class="ph"><span class="ph-ico">📷</span></div>`;
  const main=imgs[0]?`<img src="${imgs[0]}" alt="">`:phMain;
  let thumbs='';
  for(let i=0;i<4;i++){
    const im=imgs[i];
    thumbs+=`<div class="g-thumb ${i===0?'active':''}" data-i="${i}">${im?`<img src="${im}" alt="">`:phThumb}</div>`;
  }
  return `<div class="gallery">
    <div class="g-main" id="gMain">${main}</div>
    <div class="g-thumbs">${thumbs}</div>
    ${imgs.length?'':'<div class="ph-note">ภาพจะแสดงเมื่อนำเข้าผ่านระบบหลังบ้าน</div>'}
  </div>`;
}

function render(c){
  const col=TYPE_COLORS[c.type]||'#4a8c3f';
  const id=DETAILS.indexOf(c);
  const prev=(id-1+DETAILS.length)%DETAILS.length;
  const next=(id+1)%DETAILS.length;
  document.getElementById('tnName').textContent=c.name;
  document.title=c.name+' | ศูนย์เรียนรู้หนองบัวลำภู';

  const facts=c.facts.map(f=>`<div class="fact"><div class="f-ico">${f.ico}</div><div class="f-v">${f.v}</div><div class="f-l">${f.l}</div></div>`).join('');
  const bases=c.bases.map((b,i)=>`<div class="base"><span class="b-num">${String(i+1).padStart(2,'0')}</span><div class="b-ico">${b.ico}</div><h4>${b.t}</h4><p>${b.d}</p></div>`).join('');
  const chips=c.products.map(p=>`<span class="chip"><span class="c-dot"></span>${p}</span>`).join('');
  const story=c.story.map(p=>`<p>${p}</p>`).join('');
  const tl=c.upcoming.map(u=>`<div class="tl-item"><div class="tl-dot">📌</div><div class="tl-body"><div class="tl-when">${u.w}</div><div class="tl-what">${u.t}</div></div></div>`).join('');
  const amen=Object.keys(AMEN).map(k=>{const on=c.amenities[k];return `<div class="amen-item ${on?'':'off'}"><span class="a-ico">${AMEN[k][0]}</span> ${AMEN[k][1]} <span class="a-x">${on?'✓':'✕'}</span></div>`;}).join('');

  document.getElementById('content').innerHTML=`
  <section class="hero" style="padding:0">
    <div class="wrap">
      <div class="hero-grid">
        <div class="hero-text reveal">
          <div class="wrapn">
            <div class="crumb">หน้ารวมศูนย์ › ${c.district}</div>
            <span class="hero-badge" style="background:${col}">${c.emoji} ${c.type}</span>
            <h1>${c.name}</h1>
            <div class="hero-loc">📍 ตำบล${c.tambon} · อำเภอ${c.district} · จังหวัดหนองบัวลำภู</div>
            <div class="hero-mini">
              <div class="hm"><div class="v">${fmt(c.visitors)}</div><div class="l">ผู้เข้าชม/ปี</div></div>
              <div class="hm"><div class="v">${fmt(c.trained)}</div><div class="l">ผู้อบรม/ปี</div></div>
              <div class="hm"><div class="v">${c.satisfaction}/5</div><div class="l">ความพึงพอใจ</div></div>
            </div>
          </div>
        </div>
        ${gallery(c.images)}
      </div>
    </div>
  </section>

  <section class="s-story"><div class="wrap reveal">
    <div class="sec-label">เรื่องราว · Story</div>
    <h2 class="sec-title">ที่มาและความสำคัญ</h2>
    <div class="story-body">${story}</div>
  </div></section>

  <section class="s-facts"><div class="wrap reveal">
    <div class="sec-label">ข้อมูลสำคัญ · At a glance</div>
    <h2 class="sec-title">รู้จักศูนย์ในพริบตา</h2>
    <div class="facts-grid">${facts}</div>
  </div></section>

  <section class="s-bases"><div class="wrap reveal">
    <div class="sec-label">ฐานเรียนรู้ · Learning bases</div>
    <h2 class="sec-title">สิ่งที่จะได้เรียนรู้</h2>
    <div class="bases">${bases}</div>
  </div></section>

  <section class="s-video"><div class="wrap reveal">
    <div class="sec-label">วิดีโอ · Video</div>
    <h2 class="sec-title">วิดีโอแนะนำศูนย์</h2>
    <div class="video-box">${c.video?`<iframe src="${c.video}" allowfullscreen loading="lazy"></iframe>`:`<div class="video-ph"><div class="vp-play">▶</div><div class="vp-tx">โปรดนำวิดีโอเข้า</div><div class="vp-note">วิดีโอจะแสดงเมื่อนำเข้าผ่านระบบหลังบ้าน</div></div>`}</div>
  </div></section>

  <section class="s-products"><div class="wrap reveal">
    <div class="sec-label">ผลผลิต · Products</div>
    <h2 class="sec-title">พืชผลและผลิตภัณฑ์</h2>
    <div class="chips">${chips}</div>
  </div></section>

  <section class="s-upcoming"><div class="wrap reveal">
    <div class="sec-label">กิจกรรม · Upcoming</div>
    <h2 class="sec-title">กิจกรรมที่กำลังจะจัดขึ้น</h2>
    <div class="timeline">${tl}</div>
  </div></section>

  <section class="s-visit"><div class="wrap reveal">
    <div class="sec-label">การเดินทาง · Plan your visit</div>
    <h2 class="sec-title">วางแผนการเดินทาง</h2>
    <div class="visit-grid">
      <div>
        <div class="amen-list">${amen}</div>
        <div class="contact-card">
          <h4>ผู้ประสานงาน</h4>
          <div class="cc-row">👤 ${c.contact}</div>
          <div class="cc-row">📞 <a href="tel:${c.phone.replace(/-/g,'')}">${c.phone}</a></div>
        </div>
      </div>
      <div>
        <div id="dmap"></div>
        <a class="go-btn" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}">🧭 เปิดนำทางด้วย Google Maps</a>
      </div>
    </div>
  </div></section>

  <section class="s-share"><div class="wrap reveal">
    <div class="share-grid">
      <div class="share-card">
        <h3>⭐ ร่วมประเมินความพึงพอใจ</h3>
        <p>สำหรับผู้เข้าชมและผู้เข้าอบรม — สแกน QR หรือกดปุ่มเพื่อให้คะแนนศูนย์นี้</p>
        <div class="share-btns">
          <a class="share-btn primary" href="survey.html?id=${id}">📝 ให้คะแนนศูนย์นี้</a>
        </div>
      </div>
      <div class="qr-card">
        <div id="qrSurvey"></div>
        <span>สแกนเพื่อให้คะแนน</span>
      </div>
    </div>
    <div class="share-grid" style="margin-top:16px">
      <div class="share-card">
        <h3>🔗 แชร์ศูนย์นี้</h3>
        <p>ส่งหน้านี้ให้เพื่อนหรือผู้สนใจ เพื่อชวนมาศึกษาดูงาน</p>
        <div class="share-btns">
          <button class="share-btn primary" onclick="doShare()">แชร์</button>
          <button class="share-btn ghost" onclick="copyLink()">📋 คัดลอกลิงก์</button>
          <span class="copied" id="copied">คัดลอกแล้ว ✓</span>
        </div>
      </div>
      <div class="qr-card">
        <div id="qrbox"></div>
        <span>สแกนเพื่อเปิดหน้านี้</span>
      </div>
    </div>
    <div class="prevnext">
      <a class="pn prev" href="detail.html?id=${prev}"><span class="pn-dir">← ศูนย์ก่อนหน้า</span><span class="pn-name">${DETAILS[prev].name}</span></a>
      <a class="pn next" href="detail.html?id=${next}"><span class="pn-dir">ศูนย์ถัดไป →</span><span class="pn-name">${DETAILS[next].name}</span></a>
    </div>
  </div></section>`;

  // gallery thumb swap
  const imgs=c.images;
  if(imgs.length){
    document.querySelectorAll('.g-thumb').forEach(th=>th.onclick=()=>{
      const i=+th.dataset.i; if(!imgs[i])return;
      document.getElementById('gMain').innerHTML=`<img src="${imgs[i]}" alt="">`;
      document.querySelectorAll('.g-thumb').forEach(x=>x.classList.remove('active'));
      th.classList.add('active');
    });
  }

  // map
  const map=L.map('dmap',{scrollWheelZoom:false}).setView([c.lat,c.lng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
  const icon=L.divIcon({className:'',html:`<div style="background:${col};width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:17px">${c.emoji}</span></div>`,iconSize:[36,36],iconAnchor:[18,36]});
  L.marker([c.lat,c.lng],{icon}).addTo(map);

  // QR codes: survey (ให้คะแนน) + this page (share)
  try{
    var surveyURL=new URL('survey.html?id='+id, location.href).href;
    new QRCode(document.getElementById('qrSurvey'),{text:surveyURL,width:118,height:118,colorDark:'#1c4a2c',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    new QRCode(document.getElementById('qrbox'),{text:location.href,width:118,height:118,colorDark:'#14331f',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  }catch(e){}
}

function doShare(){
  const data={title:document.title,text:'ศูนย์เรียนรู้ จังหวัดหนองบัวลำภู',url:location.href};
  if(navigator.share){navigator.share(data).catch(()=>{});}else{copyLink();}
}
function copyLink(){
  const done=()=>{const c=document.getElementById('copied');if(c){c.classList.add('show');setTimeout(()=>c.classList.remove('show'),2000);}};
  if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(done).catch(done);}
  else{const t=document.createElement('textarea');t.value=location.href;document.body.appendChild(t);t.select();try{document.execCommand('copy');}catch(e){}t.remove();done();}
}

const CONFIG={GAS_URL:'https://script.google.com/macros/s/AKfycbxBaLvvyeQYE2nuPPC8K5aA6cPL7s6Chab7WWhR1PoWu1X3s3uR-Wc0AUmeypjyLrtk/exec'};   // ว่าง = ใช้ข้อมูลตัวอย่าง
function jsonp(url,params,cb){
  const name='cb_'+Math.random().toString(36).slice(2); params.callback=name;
  const qs=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
  window[name]=d=>{cb(d);delete window[name];s.remove();};
  const s=document.createElement('script'); s.src=url+'?'+qs;
  s.onerror=()=>{cb(null);delete window[name];s.remove();};
  document.body.appendChild(s);
}

const id=parseInt(new URLSearchParams(location.search).get('id'),10);
if(isNaN(id)||!DETAILS[id]){
  document.getElementById('content').innerHTML='<div id="notfound"><h2 style="color:var(--forest-900);margin-bottom:10px">ไม่พบข้อมูลศูนย์</h2><p>กรุณากลับไปเลือกศูนย์จากหน้ารวม</p><p style="margin-top:18px"><a href="index.html" style="color:var(--leaf);font-weight:600">← กลับหน้ารวมศูนย์</a></p></div>';
}else{
  render(DETAILS[id]);
  if(CONFIG.GAS_URL){
    jsonp(CONFIG.GAS_URL,{action:'getCenter',id:id},r=>{
      if(r&&r.center){ const c=r.center;
        // เก็บเนื้อหาเชิงบรรยายจากตัวอย่างไว้หากชีตยังว่าง
        const base=DETAILS[id];
        ['story','bases','products','facts','upcoming','video','images'].forEach(k=>{
          if((Array.isArray(c[k])&&!c[k].length)||!c[k]) c[k]=base[k];
        });
        if(!c.facts) c.facts=base.facts;
        render(c);
      }
    });
  }
}
</script>
